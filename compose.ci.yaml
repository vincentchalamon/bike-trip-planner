# Docker Compose CI overlay for compose.prod.yaml
# Usage: docker compose -f compose.prod.yaml -f compose.ci.yaml up -d php pwa worker redis --no-build --wait
services:
  php:
    image: bike-trip-planner-php:ci

  worker:
    image: bike-trip-planner-php:ci

  pwa:
    image: bike-trip-planner-pwa:ci
