# Recette overlay on top of compose.yaml (iso-prod).
#
# Keeps the prod topology untouched (APP_ENV=prod, read_only, JWT secrets) and ONLY
# adds a Mailcatcher service (capture magic-link emails for the real auth flow).
# The AI tier is an optional, per-user cloud provider (ADR-042) — there is no local
# AI service to wire here; AI is exercised in recette by configuring a provider +
# token on a test account.
#
# Load EXPLICITLY (never auto-loaded): docker compose -f compose.yaml -f compose.recette.yaml ...
# Named compose.recette.yaml (not compose.override.yaml) to avoid implicit auto-load.
# JWT keys + passphrase are wired here (overrides below), so `make start-recette`
# and `make provision-recette` no longer pass JWT_* on the command line; they only
# generate the keypair under .docker/jwt-recette/ (openssl) when missing. Valhalla
# (re-routing) stays opt-in via `--profile routing` + a regional OSM extract.

# Recette JWT secrets: the keypair lives under .docker/jwt-recette/ (generated by
# `make start-recette`). Overriding the top-level secrets here points the prod
# `jwt_private_key` / `jwt_public_key` Docker secrets at those files, so the
# JWT_PRIVATE_KEY_PATH / JWT_PUBLIC_KEY_PATH env vars are no longer needed.
secrets:
  jwt_private_key:
    file: .docker/jwt-recette/private.pem
  jwt_public_key:
    file: .docker/jwt-recette/public.pem

# Shared env for php/worker/worker-llm — extension field + YAML merge key to avoid
# duplicating the block across the three services (review #612).
x-recette-env: &recette-env
  MAILER_DSN: smtp://mailcatcher:1025
  JWT_PASSPHRASE: recette
  # Non-default Mercure key so the SEC-004 fail-closed boot guard passes locally.
  # Publisher/subscriber/secret must match for the embedded hub to verify the
  # app-issued subscriber tokens (HS256).
  MERCURE_PUBLISHER_JWT_KEY: recette-mercure-jwt-secret
  MERCURE_SUBSCRIBER_JWT_KEY: recette-mercure-jwt-secret
  MERCURE_JWT_SECRET: recette-mercure-jwt-secret

services:
  php:
    environment:
      <<: *recette-env

  worker:
    environment:
      <<: *recette-env

  worker-llm:
    environment:
      <<: *recette-env

  # Recette re-enables the AI surface to be tested end-to-end (ADR-046's
  # default-off is a prod fail-safe; recette is where AI is exercised — see the
  # header note). NEXT_PUBLIC_ENABLE_AI is inlined into the PWA bundle at build
  # time, so this only takes effect on a rebuild: after toggling, run
  #   docker compose -f compose.yaml -f compose.recette.yaml build pwa
  # (`make start-recette` uses `up --wait`, which does not rebuild on its own).
  pwa:
    build:
      args:
        NEXT_PUBLIC_ENABLE_AI: "true"

  mailcatcher:
    # Pinned by digest: schickling/mailcatcher has no versioned tags, and the
    # mutable tag would let an upstream rebuild change the HTTP API recette-seed.sh relies on.
    image: schickling/mailcatcher@sha256:55ed289525a565f7587b138a423705267eb34eda1ec8d35acd6dc7966a933e84
    restart: unless-stopped
    ports:
      - target: 1080
        published: ${MAILCATCHER_PORT:-1080}
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; Net::HTTP.get(URI('http://localhost:1080'))\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
