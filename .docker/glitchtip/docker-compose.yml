# GlitchTip self-hosted stack (P1.1, ADR-031).
#
# Deployed as an independent Coolify service stack — not part of the main
# bike-trip-planner compose project so the app and the error tracker have
# distinct lifecycles. Exposed at https://errors.biketrip.mooo.com via the
# Coolify-managed Traefik (Let's Encrypt auto-TLS).
#
# Resource envelope: ~500 MB RAM, ~2 GB persistent volume over the 30-day
# retention window.
#
# All four containers live on the internal `glitchtip` network. Only the
# `glitchtip-web` container is published to the outside (port 8000 → Traefik).

services:
  glitchtip-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?GLITCHTIP_DB_PASSWORD is required}
    volumes:
      - glitchtip_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - glitchtip

  glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - glitchtip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - glitchtip

  glitchtip-web:
    image: glitchtip/glitchtip:6.1.6
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?GLITCHTIP_SECRET_KEY is required}
      PORT: "8000"
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://errors.biketrip.mooo.com}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@biketrip.mooo.com}
      CELERY_WORKER_AUTOSCALE: "1,3"
      # Strict event retention: 30 days, matches ADR-031.
      GLITCHTIP_MAX_EVENT_LIFE_DAYS: "30"
    ports:
      - "8000:8000"
    networks:
      - glitchtip
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/0/"]
      interval: 30s
      timeout: 5s
      retries: 3

  glitchtip-worker:
    image: glitchtip/glitchtip:6.1.6
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://errors.biketrip.mooo.com}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@biketrip.mooo.com}
      CELERY_WORKER_AUTOSCALE: "1,3"
    networks:
      - glitchtip

networks:
  glitchtip:
    driver: bridge

volumes:
  glitchtip_postgres_data:
  glitchtip_redis_data:
