# Development overrides, layered on the iso-prod compose.yaml.
#
# Loaded automatically by the Makefile via COMPOSE_FILE=compose.yaml:compose.dev.yaml.
# NEVER used in production: Coolify and CI read compose.yaml alone, so the dev
# tweaks here cannot leak into prod. This file is intentionally NOT named
# compose.override.yaml (which Docker auto-loads) to avoid that footgun. See ADR-037.
#
# Dev keeps the prod topology (FrankenPHP edge: reverse proxy + embedded Mercure
# + PHP app); it only swaps the build target to frankenphp_dev (Xdebug, file
# watcher), bind-mounts the source, relaxes read_only/secrets, and adds the
# dev-only mailcatcher service. The AI tier is an optional, per-user cloud
# provider (ADR-042) — there is no local AI service in the dev stack.

services:
  php:
    image: bike-trip-planner-php:dev
    build:
      target: frankenphp_dev
    read_only: false
    environment:
      APP_ENV: dev
      # Mercure demo UI + permissive CORS for local development.
      MERCURE_EXTRA_DIRECTIVES: |-
        cors_origins *
        demo
      MAILER_DSN: smtp://mailcatcher:1025
      LOCK_DSN: redis://redis:6379
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      # Dev uses lexik filesystem keys (generated by docker-entrypoint), not Docker secrets.
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      FRONTEND_URL: "${FRONTEND_URL:-https://${SERVER_NAME:-localhost}}"
    secrets: !reset null
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    # !override replaces the prod volume list (drops the prod conf.d :ro mounts;
    # frankenphp_dev bakes 20-app.dev.ini) instead of merging into it.
    volumes: !override
      - caddy_data:/data
      - caddy_config:/config
      - ./api:/app
      - ./README.md:/README.md:ro
      - /app/var
    # First dev boot installs Composer deps and runs migrations at runtime
    # (vendor is not baked into frankenphp_dev), which needs a longer grace.
    healthcheck:
      start_period: 120s

  worker:
    image: bike-trip-planner-php:dev
    build:
      target: frankenphp_dev
    read_only: false
    environment:
      APP_ENV: dev
      MAILER_DSN: smtp://mailcatcher:1025
      LOCK_DSN: redis://redis:6379
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      FRONTEND_URL: "${FRONTEND_URL:-https://${SERVER_NAME:-localhost}}"
    secrets: !reset null
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes: !override
      - ./api:/app
      - /app/var

  worker-llm:
    image: bike-trip-planner-php:dev
    build:
      target: frankenphp_dev
    read_only: false
    environment:
      APP_ENV: dev
      MAILER_DSN: smtp://mailcatcher:1025
      LOCK_DSN: redis://redis:6379
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      FRONTEND_URL: "${FRONTEND_URL:-https://${SERVER_NAME:-localhost}}"
    secrets: !reset null
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes: !override
      - ./api:/app
      - /app/var

  pwa:
    image: bike-trip-planner-pwa:dev
    build:
      target: dev
    # `next dev` + Turbopack compiles in-memory (measured ~1.4G anon working set)
    # and needs far more than the prod standalone server's 512M budget (compose.yaml,
    # sized for the #566 beta VM). Without this the container OOMs mid-compile,
    # `unless-stopped` restarts it in a loop, and `docker compose up --wait` never
    # sees it healthy (boot appears to hang). 3G leaves headroom for HMR/compile spikes.
    deploy:
      resources:
        limits:
          memory: 3G
    environment:
      NODE_ENV: development
      # Development usage only
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # AI feature flag (recette #649): on in dev so the AI surface stays visible
      # and its code keeps being exercised while it is masked in prod/recette.
      # `next dev` reads NEXT_PUBLIC_* from the runtime env (no rebuild needed).
      NEXT_PUBLIC_ENABLE_AI: "true"
      # Test-only SSE injection hook (SEC-012): on in dev so the mocked E2E suite
      # (`make test-e2e`) can inject Mercure events. `next dev` reads NEXT_PUBLIC_*
      # from the runtime env (no rebuild needed).
      NEXT_PUBLIC_ENABLE_TEST_HOOKS: "true"
      # Client API base. Default empty → the browser calls the API on the SAME
      # origin it loaded from (relative URLs), so the app works unchanged whether
      # served on https://localhost or through a tunnel (ngrok) for mobile
      # testing. SSR keeps using the internal API_BACKEND_URL (http://php).
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL-}"
      # Mercure hub the browser subscribes to. Point it at the tunnel origin to
      # get live SSE updates on mobile; the localhost default is fine on desktop.
      NEXT_PUBLIC_MERCURE_URL: "${NEXT_PUBLIC_MERCURE_URL:-https://localhost/.well-known/mercure}"
    volumes: !override
      - ./pwa:/srv/app
      - pwa_node_modules:/srv/app/node_modules
      - pwa_next:/srv/app/.next
    # First boot runs `npm install` (empty node_modules volume) before serving.
    healthcheck:
      start_period: 120s

  mailcatcher:
    # Pinned by digest (same as compose.recette.yaml): no versioned tags upstream.
    image: schickling/mailcatcher@sha256:55ed289525a565f7587b138a423705267eb34eda1ec8d35acd6dc7966a933e84
    restart: unless-stopped
    ports:
      - target: 1080
        published: ${MAILCATCHER_PORT:-1080}
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; Net::HTTP.get(URI('http://localhost:1080'))\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Dev provisioner: build the `dev` target with the working tree mounted, so
  # `make provision` and the provisioner QA targets run against live code
  # (the prod base bakes the sources into the image instead). The explicit `:dev`
  # tag keeps it distinct from the `:prod` image (compose.yaml) so the two targets
  # never collide — that collision is what forced recette's `--build`.
  provisioner:
    image: bike-trip-planner-provisioner:dev
    build:
      target: dev
    volumes: !override
      - .docker/osm/data:/data
      - ./provisioner:/app

volumes:
  # Dev-only: the pwa source mounts live in this file's pwa override.
  pwa_node_modules: ~
  pwa_next: ~
