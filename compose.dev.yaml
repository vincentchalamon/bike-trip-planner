# Development overrides, layered on the iso-prod compose.yaml.
#
# Loaded automatically by the Makefile via COMPOSE_FILE=compose.yaml:compose.dev.yaml.
# NEVER used in production: Coolify and CI read compose.yaml alone, so the dev
# tweaks here cannot leak into prod. This file is intentionally NOT named
# compose.override.yaml (which Docker auto-loads) to avoid that footgun. See ADR-037.
#
# Dev keeps the prod topology (FrankenPHP edge: reverse proxy + embedded Mercure
# + PHP app); it only swaps the build target to frankenphp_dev (Xdebug, file
# watcher), bind-mounts the source, relaxes read_only/secrets, and adds the
# dev-only mailcatcher and ollama services.

services:
  php:
    image: bike-trip-planner-php:dev
    build:
      target: frankenphp_dev
    read_only: false
    environment:
      APP_ENV: dev
      # Mercure demo UI + permissive CORS for local development.
      MERCURE_EXTRA_DIRECTIVES: |-
        cors_origins *
        demo
      MAILER_DSN: smtp://mailcatcher:1025
      WIKIDATA_USER_AGENT: "${WIKIDATA_USER_AGENT:-BikeTripPlanner/1.0 (contact@example.org)}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_ENABLED: "${OLLAMA_ENABLED:-0}"
      LOCK_DSN: redis://redis:6379
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      # Dev uses lexik filesystem keys (generated by docker-entrypoint), not Docker secrets.
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      FRONTEND_URL: "https://${SERVER_NAME:-localhost}"
    secrets: !reset null
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    # !override replaces the prod volume list (drops the prod conf.d :ro mounts;
    # frankenphp_dev bakes 20-app.dev.ini) instead of merging into it.
    volumes: !override
      - caddy_data:/data
      - caddy_config:/config
      - ./api:/app
      - ./README.md:/README.md:ro
      - /app/var
    # First dev boot installs Composer deps and runs migrations at runtime
    # (vendor is not baked into frankenphp_dev), which needs a longer grace.
    healthcheck:
      start_period: 120s

  worker:
    image: bike-trip-planner-php:dev
    build:
      target: frankenphp_dev
    read_only: false
    environment:
      APP_ENV: dev
      MAILER_DSN: smtp://mailcatcher:1025
      WIKIDATA_USER_AGENT: "${WIKIDATA_USER_AGENT:-BikeTripPlanner/1.0 (contact@example.org)}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_ENABLED: "${OLLAMA_ENABLED:-0}"
      LOCK_DSN: redis://redis:6379
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      FRONTEND_URL: "https://${SERVER_NAME:-localhost}"
    secrets: !reset null
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes: !override
      - ./api:/app
      - /app/var

  pwa:
    image: bike-trip-planner-pwa:dev
    build:
      target: dev
    environment:
      NODE_ENV: development
      # Development usage only
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes: !override
      - ./pwa:/srv/app
      - pwa_node_modules:/srv/app/node_modules
      - pwa_next:/srv/app/.next

  mailcatcher:
    image: schickling/mailcatcher
    restart: unless-stopped
    ports:
      - target: 1080
        published: ${MAILCATCHER_PORT:-1080}
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; Net::HTTP.get(URI('http://localhost:1080'))\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    expose:
      - 11434
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # /api/tags is the lightest endpoint exposed by Ollama (lists local models).
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  ollama-data: ~
