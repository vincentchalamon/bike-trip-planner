name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: source-url
    attributes:
      label: Source URL used
      description: The Komoot/MyMaps URL that triggered the issue (if applicable).
      placeholder: https://www.komoot.com/tour/...

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Trip planning (route import)
        - Pacing / stages
        - Alerts
        - Accommodations
        - Weather
        - PDF roadbook
        - UI / frontend
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, screenshots, logs, etc.
