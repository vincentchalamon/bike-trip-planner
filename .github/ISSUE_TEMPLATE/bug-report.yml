name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below — fields marked as required help us diagnose the issue faster.

  - type: input
    id: url
    attributes:
      label: URL
      description: URL of the page where the bug appeared.
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: request_id
    attributes:
      label: Request ID
      description: Visible in the app error toast (click to copy). Leave blank if not applicable.
      placeholder: e.g. 01HRX...

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Screenshots, videos, logs, or any additional context (drag and drop files here).
