name: Android APK

on:
  release:
    types:
      - published
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        working-directory: pwa
        run: npm ci

      - name: Build Next.js
        working-directory: pwa
        env:
          BUILD_TARGET: mobile
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_MERCURE_URL: ${{ vars.NEXT_PUBLIC_MERCURE_URL }}
        run: npm run build

      - name: Sync Capacitor
        working-directory: pwa
        run: |
          test -d android || npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: pwa/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: pwa/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" pwa/android/app/build/outputs/apk/release/*.apk --clobber
