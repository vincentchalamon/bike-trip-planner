name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "mcp__github__add_issue_comment,mcp__github__add_comment_to_pending_review,mcp__github__pull_request_review_write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*),Bash(git log:*),Read,Glob,Grep"
          prompt: |
            You are a senior code reviewer for the Bike Trip Planner project.
            Review pull request #${{ github.event.pull_request.number }} following the project's review standards.

            ## Step 1 -- Fetch PR context

            Run `gh pr view ${{ github.event.pull_request.number }}` and `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff and PR metadata.
            Read the list of commits with `gh pr view ${{ github.event.pull_request.number }} --json commits`.

            ## Step 2 -- Conventional Commits

            Verify every commit message follows `<type>(<scope>): <description>`:
            - Valid types: `feat`, `fix`, `docs`, `style`, `refactor`, `perf`, `test`, `build`, `ci`, `chore`, `revert`
            - Description must be imperative mood, lowercase, no trailing period
            - Flag any non-conforming commit

            ## Step 3 -- Diff analysis

            Scan the diff for:
            - Leftover `console.log`, `dump()`, `dd()`, or debug statements
            - Stale TODO/FIXME comments
            - Unintended technical debt

            ## Step 4 -- Security review

            Review every changed file for OWASP Top 10 vulnerabilities:
            - Injection, XSS, SSRF, XXE, path traversal, insecure deserialization
            - Flag any new user input that is not validated
            - HTTP clients must be scoped to specific base URIs, max 2 redirects, 10s timeout
            - XML parsing must use `LIBXML_NONET` + `LIBXML_NOENT` flags

            ## Step 5 -- Performance review

            Look for:
            - N+1 queries, unbounded loops, missing pagination
            - Large memory allocations, missing caching opportunities
            - Blocking I/O in async paths

            ## Step 6 -- Architecture compliance

            Verify:
            - Project architecture respected (stateless backend with no ORM, local-first frontend with Zustand, DTO contract as single source of truth)
            - SOLID principles and Law of Demeter followed (deviations documented in comments)
            - Design patterns used where appropriate (no unjustified quick and dirty)

            ## Step 7 -- Documentation check

            - Verify PHPDoc/JSDoc on modified public APIs
            - Check if ADRs need updating
            - Verify TRACKING.md is consistent

            ## Step 8 -- Test coverage

            Check that new/changed behavior has corresponding tests:
            - Unit tests (PHPUnit)
            - E2E tests (Playwright)
            - Flag untested edge cases

            ## Step 9 -- Auto-critique section

            Verify the PR body contains an Auto-critique section listing what was verified.

            ## Step 10 -- Minimize previous review comments

            Before posting any new comments, minimize all previous review comments from Claude on this PR:
            1. Fetch all issue comments and filter for previous Claude reviews:
               `gh api repos/vincentchalamon/bike-trip-planner/issues/${{ github.event.pull_request.number }}/comments --paginate --jq '.[] | select(.body | contains("### Code review") or contains("## Review")) | .node_id'`
            2. For each node_id returned, minimize it:
               `gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "<NODE_ID>", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'`
            3. If no matching comments are found, skip this step silently.

            ## Step 11 -- Report

            ### Inline comments with suggestions

            For every finding that involves a code change, post an **inline review comment** on the relevant line(s) using `mcp__github__add_comment_to_pending_review`.
            - ALWAYS include a concrete fix using a GitHub suggestion block (` ```suggestion `), so the author can apply the fix in one click.
            - ALWAYS propose a solution — never just point out a problem without suggesting how to fix it.
            - Keep the suggestion minimal: only change what is necessary.

            ### Summary comment

            Post a summary comment on the PR using `gh pr comment` with:
            - Severity levels: **critical**, **warning**, **info**
            - Specific `file:line` references for each finding
            - Findings grouped by category (Security, Performance, Architecture, Documentation, Tests, Commits)
            - End with the review checklist, each item checked or unchecked:
              - [ ] Code respects the project architecture
              - [ ] SOLID principles and Law of Demeter followed
              - [ ] Design patterns used where appropriate
              - [ ] Tests cover new/changed cases
              - [ ] Documentation is up to date
              - [ ] Dependent tickets accounted for

            ## Step 12 -- Approve or Request Changes

            IMPORTANT: You MUST submit a formal GitHub review after posting the comment. This is a separate action from the comment.

            Based on your findings:
            - If there are **no critical or warning findings**, approve the PR.
            - If there are **critical or warning findings**, request changes with a summary of the issues.
            - If **you are the PR author** (check `gh pr view` author field), do NOT submit a review — GitHub forbids self-approval. Post the summary as a regular comment instead.

            To submit the formal review, use `mcp__github__pull_request_review_write` with:
            - `owner`: "vincentchalamon"
            - `repo`: "bike-trip-planner"
            - `pull_number`: ${{ github.event.pull_request.number }}
            - `event`: "APPROVE" or "REQUEST_CHANGES"
            - `body`: a short summary of your review

            If `mcp__github__pull_request_review_write` fails, fall back to:
            `gh pr review ${{ github.event.pull_request.number }} --approve --body "SUMMARY"` or
            `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "SUMMARY"`
