name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Check if workflow file changed
        id: check-self
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --jq '.[].filename' | grep -q '^\.github/workflows/claude-code-review\.yml$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping code review: the workflow file itself (claude-code-review.yml) was modified in this PR."
          fi

      - name: Checkout repository
        if: steps.check-self.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.check-self.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "mcp__github__add_comment_to_pending_review,mcp__github__pull_request_review_write,mcp__github__pull_request_read,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git log:*),Read,Glob,Grep"
          prompt: |
            You are a senior code reviewer for the Bike Trip Planner project.
            Review pull request #${{ github.event.pull_request.number }} following the project's review standards.

            Use the **Review Comment Format** section in CLAUDE.md for all comments (Conventional Comments labels, inline threads, review body structure).

            ## Step 1 -- Fetch PR context

            Run `gh pr view ${{ github.event.pull_request.number }}` and `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff and PR metadata.
            Read the list of commits with `gh pr view ${{ github.event.pull_request.number }} --json commits`.

            ## Step 2 -- Conventional Commits (PR title only)

            Verify the **PR title** follows `<type>(<scope>): <description>`:
            - Valid types: `feat`, `fix`, `docs`, `style`, `refactor`, `perf`, `test`, `build`, `ci`, `chore`, `revert`
            - Description must be imperative mood, lowercase, no trailing period
            - Do NOT check individual commit messages (commits are squashed on merge)
            - If the PR title is non-conforming, include it as a finding in the review body

            ## Step 3 -- Diff analysis

            Scan the diff for:
            - Leftover `console.log`, `dump()`, `dd()`, or debug statements
            - Stale TODO/FIXME comments
            - Unintended technical debt

            ## Step 4 -- Security review

            Review every changed file for OWASP Top 10 vulnerabilities:
            - Injection, XSS, SSRF, XXE, path traversal, insecure deserialization
            - Flag any new user input that is not validated
            - HTTP clients must be scoped to specific base URIs, max 2 redirects, 10s timeout
            - XML parsing must use `LIBXML_NONET` + `LIBXML_NOENT` flags

            ## Step 5 -- Performance review

            Look for:
            - N+1 queries, unbounded loops, missing pagination
            - Large memory allocations, missing caching opportunities
            - Blocking I/O in async paths

            ## Step 6 -- Architecture compliance

            Verify:
            - Project architecture respected (stateless backend with no ORM, local-first frontend with Zustand, DTO contract as single source of truth)
            - SOLID principles and Law of Demeter followed (deviations documented in comments)
            - Design patterns used where appropriate (no unjustified quick and dirty)

            ## Step 7 -- Documentation check

            - Verify PHPDoc/JSDoc on modified public APIs
            - Check if ADRs need updating
            - Verify TRACKING.md is consistent

            ## Step 8 -- Test coverage

            Check that new/changed behavior has corresponding tests:
            - Unit tests (PHPUnit)
            - E2E tests (Playwright)
            - Flag untested edge cases

            ## Step 9 -- Auto-critique section

            Verify the PR body contains an Auto-critique section listing what was verified.

            ## Step 10 -- Resolve addressed review threads

            Before posting new comments, check if previous review threads have been addressed by the latest push:

            1. Fetch all unresolved review threads using GraphQL:
               ```
               gh api graphql -f query='
               query {
                 repository(owner: "vincentchalamon", name: "bike-trip-planner") {
                   pullRequest(number: ${{ github.event.pull_request.number }}) {
                     reviewThreads(first: 100) {
                       nodes {
                         id
                         isResolved
                         isOutdated
                         path
                         line
                         comments(first: 1) {
                           nodes {
                             body
                             author { login }
                           }
                         }
                       }
                     }
                   }
                 }
               }'
               ```

            2. Filter threads to only keep those where the first comment author is a bot (e.g. `claude[bot]`, `github-actions[bot]`). **Never resolve threads opened by a human** — only the person who opened a thread is responsible for closing it.

            3. For each **unresolved bot-authored** thread, read the comment body and the file path/line, then check the current diff and source code to determine if the issue has been fixed.

            4. If the issue is **clearly fixed** in the current code, resolve the thread:
               ```
               gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "<THREAD_ID>"}) { thread { isResolved } } }'
               ```

            5. If the issue is **NOT fixed** or you are **unsure**, leave the thread open — do not resolve it.

            6. Include in the review body a summary of resolved threads (e.g. "Resolved N previously open threads that were addressed.").

            ## Step 11 -- Post review with inline comments

            **IMPORTANT: You MUST always submit a review, even when there are zero findings.**
            If all previous threads are resolved and there are no new findings, submit an APPROVE review.
            Never skip the review submission — a re-review with no output is confusing for the PR author.

            Follow this sequence precisely:

            ### A. Check self-review

            Check `gh pr view ${{ github.event.pull_request.number }} --json author` — if you are the PR author, GitHub forbids self-approval. In that case, use `event: "COMMENT"` instead of `APPROVE` or `REQUEST_CHANGES`.

            ### B. Determine review event

            Based on your findings:
            - **No critical or warning findings** → `APPROVE`
            - **Any critical or warning findings** → `REQUEST_CHANGES`
            - **Self-review** → `COMMENT` (always)

            ### C. Create pending review

            Use `mcp__github__pull_request_review_write` with:
            - `owner`: "vincentchalamon"
            - `repo`: "bike-trip-planner"
            - `pull_number`: ${{ github.event.pull_request.number }}
            - `event`: "PENDING"
            - `body`: "" (empty — body will be set on submit)

            ### D. Post inline comments

            For each code-level finding, post an inline comment using `mcp__github__add_comment_to_pending_review` in **Conventional Comments** format:

            ```
            <label> (<decoration>): <subject>

            ```suggestion
            <fixed code>
            ```
            ```

            Rules:
            - ALWAYS include a concrete fix using a GitHub `suggestion` block when the finding involves a code change
            - ALWAYS propose a solution — never just point out a problem
            - Keep suggestions minimal: only change what is necessary
            - Use `subjectType: "FILE"` as fallback if the exact diff line is not determinable
            - If there are more than 15 code-level findings, post the 15 most important as inline comments and summarize the rest in the review body

            ### E. Submit the review

            Use `mcp__github__pull_request_review_write` with:
            - `owner`: "vincentchalamon"
            - `repo`: "bike-trip-planner"
            - `pull_number`: ${{ github.event.pull_request.number }}
            - `event`: the event determined in step B
            - `body`: structured review body containing:
              1. **Summary** — 1-3 sentences describing the overall quality
              2. **Resolved threads** — "Resolved N previously open threads." (only include this line if threads were resolved in Step 10)
              3. **PR title check** — flag if the PR title does not follow Conventional Commits (only if there is an issue)
              4. **Review checklist**:
                 - [ ] Code respects the project architecture
                 - [ ] SOLID principles and Law of Demeter followed
                 - [ ] Design patterns used where appropriate
                 - [ ] Tests cover new/changed cases
                 - [ ] Documentation is up to date
                 - [ ] Dependent tickets accounted for
              5. **Inline comments** — "Posted N inline comments." (or "No inline comments." if none)
              6. **Footer** — "Generated with [Claude Code](https://claude.ai/code)"

            **IMPORTANT: This step is NOT optional.** You must ALWAYS reach this step and submit the review.
            If you created a PENDING review, you MUST submit it — an unsubmitted pending review is invisible on GitHub.

            If `mcp__github__pull_request_review_write` fails on submit, retry once with `event: "COMMENT"` as fallback.
