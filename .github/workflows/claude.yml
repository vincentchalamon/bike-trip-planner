name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  pick:
    if: |
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude pick') &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    concurrency:
      group: pick-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Parse base branch from comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Extract optional base branch: "@claude pick [base-branch]"
          BASE=$(echo "$COMMENT_BODY" | grep -oP '@claude\s+pick\s+\K\S+' || echo "main")
          echo "base_branch=$BASE" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          BASE_BRANCH: ${{ steps.parse.outputs.base_branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "mcp__github__*,Bash(*),Read,Glob,Grep,Write,Edit"
          prompt: |
            You are implementing GitHub issue #${{ github.event.issue.number }} end-to-end.
            The base branch is: ${{ steps.parse.outputs.base_branch }}

            Execute these steps in order:

            ## Step 1 — Read the issue

            Use `mcp__github__get_issue` to fetch issue #${{ github.event.issue.number }} from repo `${{ github.repository }}`.
            Understand all requirements before writing any code.

            ## Step 2 — Create branch

            ```bash
            git checkout -b feature/${{ github.event.issue.number }} origin/${{ steps.parse.outputs.base_branch }}
            ```

            ## Step 3 — Implement

            Implement the solution respecting CLAUDE.md rules (architecture, SOLID, patterns, tests).
            If backend DTOs change, regenerate TS types by running: `npx openapi-typescript api/openapi.yaml -o src/lib/api/schema.d.ts` from the `pwa/` directory.

            **Important:** There is no Docker environment in CI. Do NOT run `make test`, `make qa`, or any `make` target. The CI pipeline on the PR will handle testing.

            ## Step 4 — Self-review

            Run `git diff ${{ steps.parse.outputs.base_branch }}...HEAD` and review for:
            - Leftover `console.log`, `dump()`, `dd()`, or debug statements
            - Stale TODO/FIXME comments
            - Dead code (unused methods, unreachable branches, orphaned imports)
            - Architectural violations

            Fix anything found.

            ## Step 5 — Commit & push

            Stage and commit changes following Conventional Commits format.
            Push the branch: `git push -u origin feature/${{ github.event.issue.number }}`

            ## Step 6 — Create PR

            Use `mcp__github__create_pull_request` to create a **Ready for review** PR:
            - **Title:** Conventional Commits format
            - **Base:** ${{ steps.parse.outputs.base_branch }}
            - **Body** must include:
              - `## Summary` (1-3 bullet points)
              - `## Test plan` (bulleted checklist)
              - `## Auto-critique` (what was verified per CLAUDE.md)
              - `Closes #${{ github.event.issue.number }}`
              - Footer: `🤖 Generated with [Claude Code](https://claude.ai/code)`

            ## Step 7 — Monitor CI

            Run `gh pr checks --watch` to wait for CI. If CI fails:
            1. Read the failing check logs with `gh pr checks` and `gh run view`
            2. Fix the issues
            3. Commit and push
            4. Watch again

            Repeat up to 3 times. If still failing after 3 attempts, comment on the PR explaining the remaining failures.

            **IMPORTANT: NEVER close and reopen the PR to re-trigger CI. Pushing commits automatically re-triggers all CI checks via the `synchronize` event. Closing/reopening creates noise in the PR timeline and triggers unnecessary workflow re-runs.**

            ## Step 8 — Report

            Comment on issue #${{ github.event.issue.number }} with the PR URL.

      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-pick-execution
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 7

      - name: Check for permission denials
        if: always()
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -f "$EXEC_FILE" ]; then
            DENIAL_COUNT=$(jq '.[-1].permission_denials | length' "$EXEC_FILE" 2>/dev/null || echo 0)
            if [ "$DENIAL_COUNT" -gt 0 ]; then
              echo "::error::Claude encountered $DENIAL_COUNT permission denial(s). See uploaded artifact."
              jq '.[-1].permission_denials' "$EXEC_FILE"
              exit 1
            fi
            echo "No permission denials found."
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi

  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.issue.pull_request || !contains(github.event.comment.body, '@claude pick')) &&
        github.event.comment.user.login == github.repository_owner
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.login == github.repository_owner
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        github.event.review.user.login == github.repository_owner
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        github.event.issue.user.login == github.repository_owner
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "mcp__github__*,Bash(*),Read,Glob,Grep,Write,Edit"

      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-execution
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 7

      - name: Check for permission denials
        if: always()
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -f "$EXEC_FILE" ]; then
            DENIAL_COUNT=$(jq '.[-1].permission_denials | length' "$EXEC_FILE" 2>/dev/null || echo 0)
            if [ "$DENIAL_COUNT" -gt 0 ]; then
              echo "::error::Claude encountered $DENIAL_COUNT permission denial(s). See uploaded artifact."
              jq '.[-1].permission_denials' "$EXEC_FILE"
              exit 1
            fi
            echo "No permission denials found."
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi
