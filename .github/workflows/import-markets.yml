name: Import Markets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  import:
    name: Import weekly markets from data.gouv.fr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import markets
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: make markets-import
