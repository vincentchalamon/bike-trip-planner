name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  APP_ENV: test
  NODE_ENV: test

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      provisioner: ${{ steps.filter.outputs.provisioner }}
      pwa: ${{ steps.filter.outputs.pwa }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # merge-base required for the PR diff
      - name: Compute changed areas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            files="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"
          else
            files=""
          fi
          echo "Changed files:"; printf '%s\n' "$files"

          # Non-code assets: raster images and markdown never affect TS/PHP/tests. They are
          # recognised (so they don't trip the fail-safe) but excluded from the code zones, so an
          # image/doc-only change runs at most the markdown jobs -- never the code/E2E jobs.
          # (.svg stays "code": it can be imported as a component via SVGR.)
          noncode='\.md$|\.(png|jpe?g|gif|webp|avif|ico)$'
          # Recognised zones. Repo meta files (.git*, .github/** except workflows), the docs/ tree
          # and the non-code assets above have no code impact. Fail-safe: run the full suite on
          # non-PR events, on workflow changes, or when a file matches no zone.
          known='^api/|^provisioner/|^pwa/|^\.docker/|^\.dockerignore$|^compose[^/]*\.yaml$|^\.git|^docs/|'"$noncode"
          run_all=false
          if [ "$EVENT_NAME" != "pull_request" ]; then run_all=true; fi
          if printf '%s\n' "$files" | grep -qE '^\.github/workflows/'; then run_all=true; fi
          if [ -n "$files" ] && printf '%s\n' "$files" | grep -qvE "$known"; then run_all=true; fi

          # Code-relevant files = changed files that are neither markdown nor image assets.
          code="$(printf '%s\n' "$files" | grep -vE "$noncode" || true)"
          flag() { if [ "$run_all" = true ] || printf '%s\n' "$code" | grep -qE "$1"; then echo true; else echo false; fi; }
          api=$(flag '^api/')
          provisioner=$(flag '^provisioner/')
          pwa=$(flag '^pwa/')
          docker=$(flag '^\.docker/|^\.dockerignore$|^compose[^/]*\.yaml$')
          if [ "$run_all" = true ] || printf '%s\n' "$files" | grep -qE '\.md$'; then docs=true; else docs=false; fi
          if [ "$api" = true ] || [ "$pwa" = true ] || [ "$docker" = true ]; then e2e=true; else e2e=false; fi

          {
            echo "api=$api"
            echo "provisioner=$provisioner"
            echo "pwa=$pwa"
            echo "docker=$docker"
            echo "docs=$docs"
            echo "e2e=$e2e"
          } | tee -a "$GITHUB_OUTPUT"

  phpunit-api:
    name: PHPUnit (api)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    services:
      database:
        # PostGIS image: Foundry resets the test DB in "migrate" mode, so the
        # CREATE EXTENSION postgis migration (ADR-040) runs here too — the test
        # DB engine must match the app's PostGIS-enabled Postgres. The init
        # script also enables postgis on POSTGRES_DB and template1.
        image: postgis/postgis:18-3.6-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_DB: app_test
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Generate JWT keypair
        working-directory: api
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:test
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:test
      - name: Run PHPUnit with coverage
        working-directory: api
        env:
          XDEBUG_MODE: coverage
          DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=18&charset=utf8"
          REDIS_URL: "redis://redis:6379"
          FRONTEND_URL: "https://localhost"
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-api
          path: api/coverage/clover.xml
          retention-days: 7

  phpunit-provisioner:
    name: PHPUnit (provisioner)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.provisioner == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    services:
      database:
        image: postgis/postgis:18-3.6-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_DB: app_test
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Install osmium
        run: apt-get update && apt-get install -y --no-install-recommends osmium-tool
      - name: Get Composer cache directory
        working-directory: provisioner
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: provisioner
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run PHPUnit with coverage
        working-directory: provisioner
        env:
          XDEBUG_MODE: coverage
          DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=18&charset=utf8"
          REDIS_URL: "redis://redis:6379"
          FRONTEND_URL: "https://localhost"
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-provisioner
          path: provisioner/coverage/clover.xml
          retention-days: 7

  openapi-lint:
    name: OpenAPI Lint
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run Redocly
        working-directory: api
        run: bin/console api:openapi:export --yaml | redocly lint /dev/stdin

  # DX-003: fail if the committed TS types drifted from the backend OpenAPI spec.
  # The contract is generated by a manual `make typegen`; this regenerates it in CI
  # and asserts no diff, so a DTO change that skips typegen can't ship stale types.
  openapi-export:
    name: OpenAPI Export
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.pwa == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Export OpenAPI spec
        working-directory: api
        run: bin/console api:openapi:export > "$GITHUB_WORKSPACE/openapi.json"
      - name: Upload spec
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: openapi.json
          # Consumed seconds later by openapi-typegen-drift in the same run.
          retention-days: 1

  openapi-typegen-drift:
    name: OpenAPI → TS drift
    needs: [changes, openapi-export]
    if: >-
      !cancelled() && needs.openapi-export.result == 'success' &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.pwa == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Download OpenAPI spec
        uses: actions/download-artifact@v7
        with:
          name: openapi-spec
          path: pwa
      - name: Regenerate types
        working-directory: pwa
        run: npm run typegen
      - name: Assert schema.d.ts is up to date
        run: |
          if ! git diff --exit-code pwa/src/lib/api/schema.d.ts; then
            echo "::error::pwa/src/lib/api/schema.d.ts drifted from the OpenAPI spec. Run 'make typegen' and commit the result."
            exit 1
          fi

  hadolint:
    name: Hadolint
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.docker == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: .docker/**/Dockerfile

  php-cs-fixer-api:
    name: PHP CS Fixer (api)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get PHP CS Fixer cache
        uses: actions/cache@v6
        with:
          path: api/.php-cs-fixer.cache
          key: ${{ runner.OS }}-phpcsfixer-${{ github.sha }}
          restore-keys: |
            ${{ runner.OS }}-phpcsfixer-
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: api/**/*.php
      - name: Get Extra Arguments for PHP-CS-Fixer
        id: phpcs-intersection
        run: |
          CHANGED_FILES=$(echo "${{ steps.changed-files.outputs.all_modified_files }}" | tr ' ' '\n' | while read -r f; do [ -n "$f" ] && [ -f "$f" ] && echo "$f"; done || true)
          if ! echo "${CHANGED_FILES}" | grep -qE "^api\/(\\.php-cs-fixer(\\.dist)?\\.php|composer\\.lock)$"; then EXTRA_ARGS=$(printf -- '--path-mode=intersection\n--\n%s' "${CHANGED_FILES}"); else EXTRA_ARGS=''; fi
          echo "PHPCS_EXTRA_ARGS<<EOF" >> $GITHUB_ENV
          echo "$EXTRA_ARGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga
        with:
          args: --config=api/.php-cs-fixer.dist.php -v --dry-run --stop-on-violation --using-cache=no ${{ env.PHPCS_EXTRA_ARGS }}"

  php-cs-fixer-provisioner:
    name: PHP CS Fixer (provisioner)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.provisioner == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get PHP CS Fixer cache
        uses: actions/cache@v6
        with:
          path: provisioner/.php-cs-fixer.cache
          key: ${{ runner.OS }}-phpcsfixer-${{ github.sha }}
          restore-keys: |
            ${{ runner.OS }}-phpcsfixer-
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: provisioner/**/*.php
      - name: Get Extra Arguments for PHP-CS-Fixer
        id: phpcs-intersection
        run: |
          CHANGED_FILES=$(echo "${{ steps.changed-files.outputs.all_modified_files }}" | tr ' ' '\n' | while read -r f; do [ -n "$f" ] && [ -f "$f" ] && echo "$f"; done || true)
          if ! echo "${CHANGED_FILES}" | grep -qE "^provisioner\/(\\.php-cs-fixer(\\.dist)?\\.php|composer\\.lock)$"; then EXTRA_ARGS=$(printf -- '--path-mode=intersection\n--\n%s' "${CHANGED_FILES}"); else EXTRA_ARGS=''; fi
          echo "PHPCS_EXTRA_ARGS<<EOF" >> $GITHUB_ENV
          echo "$EXTRA_ARGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga
        with:
          args: --config=provisioner/.php-cs-fixer.dist.php -v --dry-run --stop-on-violation --using-cache=no ${{ env.PHPCS_EXTRA_ARGS }}"

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.docs == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: davidanson/markdownlint-cli2
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run Markdownlint
        run: markdownlint-cli2 "**/*.md" "!.claude/**" "!**/vendor/**" "!**/vendor-bin/**" "!pwa/node_modules/**"

  markdown-links:
    name: Markdown Links
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.docs == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
      # Internal links/anchors only (deterministic, no network). The script uses
      # Node built-ins only, so no dependency install is needed. The external URL
      # probe (--external) is network-dependent and flaky, so it is NOT gated in
      # CI: run it manually via `make link-check -- --external` (the project
      # favours manual execution over crons, cf. lighthouse.yml / #575).
      - name: Check Markdown links & anchors (internal)
        run: node scripts/check-md-links.mjs

  security-check-api:
    name: Security Check (api)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Run Symfony Security Check
        working-directory: api
        run: symfony check:security

  security-check-provisioner:
    name: Security Check (provisioner)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.provisioner == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Run Symfony Security Check
        working-directory: provisioner
        run: symfony check:security

  phpstan-api:
    name: PHPStan (api)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: WarmUp Cache
        env:
          APP_ENV: dev # required for parameters.symfony.containerXmlPath
        working-directory: api
        run: bin/console cache:warmup --no-optional-warmers
      - name: Run PHPStan
        working-directory: api
        run: vendor/bin/phpstan analyse -c phpstan.dist.neon

  phpstan-provisioner:
    name: PHPStan (provisioner)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.provisioner == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: provisioner
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: provisioner
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run PHPStan
        working-directory: provisioner
        run: vendor/bin/phpstan analyse -c phpstan.dist.neon

  rector-api:
    name: Rector (api)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.api == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run Rector
        working-directory: api
        run: vendor/bin/rector process --dry-run

  rector-provisioner:
    name: Rector (provisioner)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.provisioner == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: provisioner
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: provisioner
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run Rector
        working-directory: provisioner
        run: vendor/bin/rector process --dry-run

  playwright:
    name: Playwright
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.e2e == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: compose.yaml
      WORKER_REPLICAS: 1
      JWT_PASSPHRASE: "ci-test-passphrase"
      FRONTEND_URL: "https://localhost"
      MAILER_DSN: "null://null"
      # Non-default so the SEC-004 fail-closed boot guard passes (the prod image
      # refuses to boot on the public Mercure skeleton default).
      MERCURE_JWT_KEY: "ci-test-mercure-key"
      # Non-default so the SEC-003 fail-closed boot guard passes (the prod image
      # refuses to boot on the committed dev token-encryption key).
      AI_TOKEN_ENC_KEY: "ci-test-ai-enc-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Generate JWT keys
        run: |
          mkdir -p api/config/jwt
          openssl genpkey -algorithm RSA -out api/config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:ci-test-passphrase
          openssl rsa -pubout -in api/config/jwt/private.pem -out api/config/jwt/public.pem -passin pass:ci-test-passphrase
          echo "JWT_PRIVATE_KEY_PATH=${{ github.workspace }}/api/config/jwt/private.pem" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY_PATH=${{ github.workspace }}/api/config/jwt/public.pem" >> "$GITHUB_ENV"
      - name: Build Docker images
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          load: true
          files: |
            compose.yaml
          set: |
            *.platform=linux/amd64
            php.cache-from=type=gha,scope=php
            php.cache-from=type=gha,scope=php-main
            php.cache-to=type=gha,scope=php,mode=max
            pwa.cache-from=type=gha,scope=pwa
            pwa.cache-from=type=gha,scope=pwa-main
            pwa.cache-to=type=gha,scope=pwa,mode=max
            pwa.args.NEXT_PUBLIC_ENABLE_AI=true
            pwa.args.NEXT_PUBLIC_ENABLE_TEST_HOOKS=true
      - name: Start services
        run: docker compose up -d database php pwa worker redis --no-build --wait
      - name: Dump PHP logs on failure
        if: failure()
        run: docker compose logs php --tail 50
      - name: Run Playwright
        run: >-
          docker run --network host
          -w /app -v ./pwa:/app
          --rm --ipc=host
          mcr.microsoft.com/playwright:v1.61.0-noble
          /bin/sh -c 'npm ci; npx playwright test'
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-reports
          path: |
            pwa/playwright-report/
            pwa/test-results/
          retention-days: 7
      - name: Debug services
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  playwright-recette:
    name: Playwright BDD Recette
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.e2e == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: compose.yaml
      WORKER_REPLICAS: 1
      JWT_PASSPHRASE: "ci-test-passphrase"
      FRONTEND_URL: "https://localhost"
      MAILER_DSN: "null://null"
      # Non-default so the SEC-004 fail-closed boot guard passes (the prod image
      # refuses to boot on the public Mercure skeleton default).
      MERCURE_JWT_KEY: "ci-test-mercure-key"
      # Non-default so the SEC-003 fail-closed boot guard passes (the prod image
      # refuses to boot on the committed dev token-encryption key).
      AI_TOKEN_ENC_KEY: "ci-test-ai-enc-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Generate JWT keys
        run: |
          mkdir -p api/config/jwt
          openssl genpkey -algorithm RSA -out api/config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:ci-test-passphrase
          openssl rsa -pubout -in api/config/jwt/private.pem -out api/config/jwt/public.pem -passin pass:ci-test-passphrase
          echo "JWT_PRIVATE_KEY_PATH=${{ github.workspace }}/api/config/jwt/private.pem" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY_PATH=${{ github.workspace }}/api/config/jwt/public.pem" >> "$GITHUB_ENV"
      - name: Build Docker images
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          load: true
          files: |
            compose.yaml
          set: |
            *.platform=linux/amd64
            php.cache-from=type=gha,scope=php
            php.cache-from=type=gha,scope=php-main
            pwa.cache-from=type=gha,scope=pwa
            pwa.cache-from=type=gha,scope=pwa-main
            pwa.args.NEXT_PUBLIC_ENABLE_AI=true
            pwa.args.NEXT_PUBLIC_ENABLE_TEST_HOOKS=true
      - name: Start services
        run: docker compose up -d database php pwa worker redis --no-build --wait
      - name: Generate BDD test files
        run: >-
          docker run --network host
          -w /app -v ./pwa:/app
          --rm --ipc=host
          mcr.microsoft.com/playwright:v1.61.0-noble
          /bin/sh -c 'npm ci; npx bddgen --config playwright.bdd.config.ts'
      - name: Run BDD recette scenarios
        run: >-
          docker run --network host
          -w /app -v ./pwa:/app
          --rm --ipc=host
          mcr.microsoft.com/playwright:v1.61.0-noble
          /bin/sh -c 'npx playwright test --config playwright.bdd.config.ts'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: recette-reports
          path: |
            pwa/recette-report/
            pwa/test-results/
          retention-days: 14
      - name: Debug services on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  eslint:
    name: Eslint
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.pwa == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Run Eslint
        working-directory: pwa
        run: npm run lint

  npm-audit:
