name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  APP_ENV: test
  NODE_ENV: test

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        project:
          - "api"
          - "provisioner"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Install osmium
        if: ${{ matrix.project == 'provisioner' }}
        run: apt-get update && apt-get install -y --no-install-recommends osmium-tool
      - name: Get Composer cache directory
        working-directory: ${{ matrix.project }}
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run PHPUnit with coverage
        working-directory: ${{ matrix.project }}
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/clover.xml
          retention-days: 7

  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: api
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run Redocly
        working-directory: api
        run: bin/console api:openapi:export --yaml | redocly lint /dev/stdin

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .docker/**/Dockerfile

  php-cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - "api"
          - "provisioner"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get PHP CS Fixer cache
        uses: actions/cache@v5
        with:
          path: ${{ matrix.project }}/.php-cs-fixer.cache
          key: ${{ runner.OS }}-phpcsfixer-${{ github.sha }}
          restore-keys: |
            ${{ runner.OS }}-phpcsfixer-
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: ${{ matrix.project }}/**/*.php
      - name: Get Extra Arguments for PHP-CS-Fixer
        id: phpcs-intersection
        run: |
          CHANGED_FILES=$(echo "${{ steps.changed-files.outputs.all_modified_files }}" | tr ' ' '\n' | while read -r f; do [ -n "$f" ] && [ -f "$f" ] && echo "$f"; done || true)
          if ! echo "${CHANGED_FILES}" | grep -qE "^${{ matrix.project }}\/(\\.php-cs-fixer(\\.dist)?\\.php|composer\\.lock)$"; then EXTRA_ARGS=$(printf -- '--path-mode=intersection\n--\n%s' "${CHANGED_FILES}"); else EXTRA_ARGS=''; fi
          echo "PHPCS_EXTRA_ARGS<<EOF" >> $GITHUB_ENV
          echo "$EXTRA_ARGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga
        with:
          args: --config=${{ matrix.project }}/.php-cs-fixer.dist.php -v --dry-run --stop-on-violation --using-cache=no ${{ env.PHPCS_EXTRA_ARGS }}"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    container:
      image: davidanson/markdownlint-cli2
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Markdownlint
        run: markdownlint-cli2 "**/*.md" "!.claude/**" "!**/vendor/**" "!**/vendor-bin/**" "!pwa/node_modules/**"

  symfony-security-check:
    name: Security Check
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        project:
          - "api"
          - "provisioner"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Run Symfony Security Check
        working-directory: ${{ matrix.project }}
        run: symfony check:security

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        project:
          - "api"
          - "provisioner"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: ${{ matrix.project }}
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: WarmUp Cache
        if: ${{ matrix.project == 'api' }}
        env:
          APP_ENV: dev # required for parameters.symfony.containerXmlPath
        working-directory: ${{ matrix.project }}
        run: bin/console cache:warmup --no-optional-warmers
      - name: Run PHPStan
        working-directory: ${{ matrix.project }}
        run: vendor/bin/phpstan analyse -c phpstan.dist.neon

  rector:
    name: Rector
    runs-on: ubuntu-latest
    container:
      image: docker.io/esoledad/php:8.5
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        project:
          - "api"
          - "provisioner"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fix repository ownership
        run: git config --global --add safe.directory $(pwd)
      - name: Get Composer cache directory
        working-directory: ${{ matrix.project }}
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress
      - name: Run Rector
        working-directory: ${{ matrix.project }}
        run: vendor/bin/rector process --dry-run

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: compose.prod.yaml
      WORKER_REPLICAS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          load: true
          files: |
            compose.prod.yaml
          set: |
            *.platform=linux/amd64
            php.cache-from=type=gha,scope=php
            php.cache-from=type=gha,scope=php-main
            php.cache-to=type=gha,scope=php,mode=max
            pwa.cache-from=type=gha,scope=pwa
            pwa.cache-from=type=gha,scope=pwa-main
            pwa.cache-to=type=gha,scope=pwa,mode=max
      - name: Start services
        run: docker compose up -d database php pwa worker redis --no-build --wait
        env:
          MOCK_EXTERNAL_HTTP: "true"
      - name: Run Playwright
        run: >-
          docker run --network host
          -w /app -v ./pwa:/app
          --rm --ipc=host
          mcr.microsoft.com/playwright:v1.58.2-noble
          /bin/sh -c 'npm ci; npx playwright test'
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-reports
          path: |
            pwa/playwright-report/
            pwa/test-results/
          retention-days: 7
      - name: Debug services
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  eslint:
    name: Eslint
    runs-on: ubuntu-latest
    container:
      image: node:25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get NPM cache directory
        working-directory: pwa
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        id: npm-deps-cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - if: ${{ steps.npm-deps-cache.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        working-directory: pwa
        run: npm list
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Run Eslint
        working-directory: pwa
        run: npm run lint

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    container:
      image: node:25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get NPM cache directory
        working-directory: pwa
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        id: npm-deps-cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - if: ${{ steps.npm-deps-cache.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        working-directory: pwa
        run: npm list
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Run TypeScript Check
        working-directory: pwa
        run: npm run test:ts
