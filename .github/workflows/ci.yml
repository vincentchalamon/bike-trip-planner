        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Run unit tests with coverage
        working-directory: pwa
        run: npm run test:unit -- --coverage

  mobile-build:
    name: Mobile APK Build
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.outputs.pwa == 'true' || needs.changes.result == 'failure')
    runs-on: ubuntu-latest
    continue-on-error: true # TODO: remove once APK build is consistently stable
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        working-directory: pwa
        run: npm ci
      - name: Build Next.js (static export)
        working-directory: pwa
        env:
          NODE_ENV: production
          BUILD_TARGET: mobile
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_MERCURE_URL: ${{ vars.NEXT_PUBLIC_MERCURE_URL }}
        run: npm run build
      - name: Sync Capacitor
        working-directory: pwa
        run: |
          test -d android || npx cap add android
          npx cap sync android
      - name: Build APK
        working-directory: pwa/android
        run: ./gradlew assembleDebug
      - name: Upload APK artifact
        # Lets a mobile build be downloaded and tested from any CI run, without
        # having to cut a release just to get at the APK.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: pwa/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
